name: Public Demo Audit

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run claim audit
        run: python tools/check_claims.py .

      - name: Run export audit
        run: python tools/export_audit.py .

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: Run gateway core unit tests
        run: npm test

      - name: Build demo-ui
        run: npm run build

      - name: Run gateway smoke test
        run: npm run smoke
